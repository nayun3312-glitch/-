# Render.com 배포 설정 (Blueprint)
# 대시보드에서 "New > Blueprint"로 이 저장소를 연결하면 자동으로 읽힙니다.
services:
  - type: web
    name: instagram-analyzer
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # 값을 넣지 않으면 MOCK(목업) 모드로 동작 — 데모 배포에 안전
      - key: APIFY_API_KEY
        sync: false
